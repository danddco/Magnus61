<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CircuitDesignMx</title>

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        #cabecera {
            background-color: limegreen;
            padding: 10px;
            color: white;
        }

        .logo {
            vertical-align: middle;
        }

        #titulo {
            display: inline-block;
            text-align: center;
            width: calc(100% - 228px);
        }

        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
        }

        h1 {
            color: #333;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        footer {
            background-color: red;
            color: white;
            padding: 5px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header id="cabecera">
        <img class="logo" src="Logo-Circuit-MX.jpg" height="50">
        <h1 id="titulo">CircuitDesignMX</h1>
    </header>

    <!-- CONTENIDO -->
    <h1>Reporte de Producción - Fashident v1.0</h1>

    <div class="card">
        <h2>En Fabricación</h2>
        <h2 id="fabricacion">150</h2>
        <h2 id="fecha_fab">2026-03-13</h2>
    </div>

    <div class="card">
        <h2>Listas para enviar</h2>
        <h2 id="envio">50</h2>
        <h2 id="fecha_envio">2026-03-13</h2>
    </div>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2026 CircuitDesignMx. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
