<!DOCTYPE html>
<html lang="es">


<body>
  <style>
    .container {
    display:grid;
    grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr;
    grid-gap: 30px;
    text-align: center;
  }
    .header {
      grid-column: 3 / 7;
      grid-row: 1;
      background-color: limegreen;
      color: blanchedalmond;
    }
    .sidebar-left {
      grid-column: 2/4;
      grid-row: 2;
      background-color: red;
    }
    .main {
      grid-column: 4/6;
      grid-row: 2;
      background-color: red;
    }
    .sidebar-right {
      grid-column: 6/8;
      grid-row: 2;
      background-color: red;
    }
    .footer {
      grid-column: 2/3;
      grid-row: 3;
      background-color: rgb(24, 35, 37);

    }
  </style>
  <div class="container">
    <div class="header">Control Diario</div>
    <div class="sidebar-left">Componentes Criticos</div>
    <div class="main">Cronograma de Fabricacion</div>
    <div class="sidebar-right">Existencias de Placas</div>
    <div class="footer">5</div>
  </div>  
  <div class="container">
    <div class="header">1</div>
    <div class="sidebar-left">2</div>
    <div class="main">3</div>
    <div class="sidebar-right">4</div>
    <div class="footer">5</div>
  </div>  




</body>
