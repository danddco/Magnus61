<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Conectores</title>
    <style>
        /* Estilos Generales */
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f9;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        
        /* Estilos de la Tabla */
        table {
            width: auto;
            margin: 20px auto;
            border-collapse: collapse;
            background-color: #fff;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: center;
        }
        th {
            background-color: #007acc;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        /* CORRECCIÓN: Estilos unificados e imagen estrictamente cuadrada */
        td img {
            width: 180px !important;
            height: 180px !important;
            max-width: none !important; /* Elimina la restricción de 100px que la deformaba */
            object-fit: cover;
            object-position: center;
            cursor: pointer;
            transition: transform 0.2s;
            border-radius: 4px;
        }
        td img:hover {
            transform: scale(1.1);
        }

        /* Estilos del Modal */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            padding-top: 60px; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            overflow: auto; 
            background-color: rgba(0,0,0,0.8);
        }
        .modal-content {
            margin: auto;
            display: block;
            max-width: 80%;
        }
        .close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Control de Placas</h1>
    <table>
        <tr>
            <th>Descripcion</th>
            <th>Imagen</th>
            <th>Observaciones</th>
        </tr>

        <tr>
            <td>PuriSystems</td>
            <td><img src="imagenes/PuSy.jpeg" alt="PuriSystems" loading="lazy" decoding="async"></td>
            <td></td>
        </tr>

         <tr>
            <td>ADW Mini</td>
            <td><img src="imagenes/Mini.jpeg" alt="ADW Mini" loading="lazy" decoding="async"></td>
            <td></td>
        </tr>


    </table>

    <!-- Modal -->
    <div id="myModal" class="modal">
        <span class="close">&times;</span>
        <img class="modal-content" id="imgGrande" alt="Vista ampliada">
    </div>

    <script>
        const modal = document.getElementById("myModal");
        const modalImg = document.getElementById("imgGrande");
        const span = document.getElementsByClassName("close")[0];

        // Evento para abrir modal
        document.querySelectorAll("td img").forEach(img => {
            img.onclick = function(){
                modal.style.display = "block";
                modalImg.src = this.src;
            }
        });

        // Cerrar modal con la X
        span.onclick = function() {
            modal.style.display = "none";
        }

        // Cerrar modal al hacer clic fuera
        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>
</body>
</html>
